<h2 id="apply">📝 Apply Now</h2>

<form action="https://formsubmit.co/el/titosa" method="POST">

<input type="text" name="Full Name" placeholder="Full Name" required><br><br>

<input type="email" name="Email" placeholder="Email Address" required><br><br>

<input type="text" name="Phone Number" placeholder="Phone Number" required><br><br>

<input type="text" name="Course Name" placeholder="Course (B.Sc/M.Sc)" required><br><br>

<input type="text" name="Subject" placeholder="Subject (Chemistry)" required><br><br>

<input type="text" name="Semester" placeholder="Semester" required><br><br>

<input type="text" name="College Name" placeholder="College Name" required><br><br>

<input type="text" name="Department" placeholder="Department" required><br><br>

<textarea name="Message" placeholder="Why do you want to join?" rows="4"></textarea><br><br>

<!-- Important settings -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

<button type="submit">Submit</button>

</form>
